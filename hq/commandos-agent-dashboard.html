<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPERATIVE HQ — Agent Command</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&family=Special+Elite&display=swap');

:root {
  --olive: #4a5c2a;
  --olive-dark: #2d3a18;
  --olive-light: #6b7c3e;
  --sand: #c8a96e;
  --sand-light: #e8d4a0;
  --sand-dark: #8a6f3e;
  --khaki: #8b7355;
  --dirt: #5c4a2a;
  --black: #0a0a08;
  --red: #8b1a1a;
  --red-bright: #c0392b;
  --green-hud: #39ff14;
  --amber: #ffb347;
  --fog: rgba(20, 25, 10, 0.85);
  --panel-bg: rgba(10, 12, 6, 0.92);
  --border: #4a5c2a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--black);
  font-family: 'Share Tech Mono', monospace;
  color: var(--sand-light);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  cursor: crosshair;
}

/* ─── SCANLINES OVERLAY ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ─── VIGNETTE ─── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 9998;
}

/* ─── LAYOUT ─── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr 260px;
  grid-template-rows: 48px 1fr 160px;
  height: 100vh;
  width: 100vw;
  gap: 0;
}

/* ─── TOP BAR ─── */
.topbar {
  grid-column: 1 / -1;
  background: var(--olive-dark);
  border-bottom: 2px solid var(--olive-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  position: relative;
  overflow: hidden;
}

.topbar::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 40px,
    rgba(255,255,255,0.02) 40px,
    rgba(255,255,255,0.02) 41px
  );
}

.title-block {
  display: flex;
  align-items: center;
  gap: 12px;
}

.title-skull {
  font-size: 20px;
  filter: drop-shadow(0 0 4px var(--red-bright));
}

.title-text {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--sand);
  letter-spacing: 4px;
  text-transform: uppercase;
}

.title-sub {
  font-size: 9px;
  color: var(--olive-light);
  letter-spacing: 3px;
}

.topbar-status {
  display: flex;
  gap: 24px;
  font-size: 11px;
  color: var(--olive-light);
}

.status-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.status-val {
  color: var(--green-hud);
  font-size: 14px;
  font-weight: bold;
}

.clock {
  font-family: 'Oswald', sans-serif;
  font-size: 20px;
  color: var(--amber);
  letter-spacing: 2px;
}

/* ─── LEFT PANEL — ROSTER ─── */
.panel-left {
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  background: var(--olive-dark);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--sand);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-header::before {
  content: '▶';
  color: var(--red-bright);
  font-size: 8px;
}

.roster {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.roster::-webkit-scrollbar { width: 4px; }
.roster::-webkit-scrollbar-track { background: transparent; }
.roster::-webkit-scrollbar-thumb { background: var(--olive); }

.unit-card {
  background: rgba(74, 92, 42, 0.15);
  border: 1px solid rgba(74, 92, 42, 0.4);
  border-radius: 2px;
  padding: 8px 10px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}

.unit-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--olive-light);
  transition: background 0.2s;
}

.unit-card:hover {
  background: rgba(74, 92, 42, 0.35);
  border-color: var(--olive-light);
}

.unit-card.active::before { background: var(--green-hud); }
.unit-card.busy::before { background: var(--amber); }
.unit-card.waiting::before { background: var(--red-bright); }
.unit-card.selected { border-color: var(--sand); background: rgba(200, 169, 110, 0.1); }

.unit-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.unit-sprite {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
}

.unit-info { flex: 1; min-width: 0; }

.unit-name {
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--sand);
  letter-spacing: 1px;
}

.unit-role {
  font-size: 9px;
  color: var(--olive-light);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.unit-status {
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 1px;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: 1px solid;
}

.status-active { color: var(--green-hud); border-color: var(--green-hud); background: rgba(57,255,20,0.08); }
.status-busy { color: var(--amber); border-color: var(--amber); background: rgba(255,179,71,0.08); }
.status-waiting { color: var(--red-bright); border-color: var(--red-bright); background: rgba(192,57,43,0.08); }
.status-idle { color: var(--khaki); border-color: var(--khaki); background: transparent; }

.unit-task {
  font-size: 10px;
  color: var(--khaki);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 4px;
  font-style: italic;
}

.unit-progress {
  margin-top: 6px;
  height: 3px;
  background: rgba(74, 92, 42, 0.3);
  border-radius: 1px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: var(--olive-light);
  border-radius: 1px;
  transition: width 1s linear;
}

.progress-bar.active { background: var(--green-hud); box-shadow: 0 0 6px var(--green-hud); }
.progress-bar.waiting { background: var(--red-bright); }

/* ─── MAP AREA ─── */
.map-area {
  position: relative;
  overflow: hidden;
  background: var(--olive-dark);
}

.map-canvas {
  position: absolute;
  inset: 0;
  /* Isometric grid background */
  background-image:
    linear-gradient(rgba(74,92,42,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,92,42,0.12) 1px, transparent 1px),
    radial-gradient(ellipse at 30% 40%, rgba(45,58,24,0.8) 0%, rgba(10,12,6,0.95) 70%);
  background-size: 40px 40px, 40px 40px, 100% 100%;
}

/* Terrain patches */
.terrain {
  position: absolute;
  border-radius: 50%;
  opacity: 0.4;
}

.map-label {
  position: absolute;
  font-family: 'Special Elite', serif;
  font-size: 9px;
  color: rgba(200,169,110,0.35);
  letter-spacing: 2px;
  text-transform: uppercase;
  pointer-events: none;
  user-select: none;
}

/* Agent tokens on map */
.agent-token {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 10;
  transition: transform 0.3s ease;
}

.agent-token:hover { transform: translate(-50%, -50%) scale(1.2); z-index: 20; }

.token-shadow {
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 8px;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  filter: blur(3px);
}

.token-sprite {
  width: 40px;
  height: 40px;
  position: relative;
}

.token-label {
  text-align: center;
  font-size: 8px;
  color: var(--sand-light);
  margin-top: 2px;
  font-family: 'Oswald', sans-serif;
  letter-spacing: 1px;
  text-shadow: 0 1px 3px black, 0 0 8px black;
  white-space: nowrap;
}

.token-pulse {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid var(--green-hud);
  animation: pulse 1.5s infinite;
  opacity: 0;
}

.token-pulse.active { opacity: 1; }

@keyframes pulse {
  0% { transform: scale(0.8); opacity: 0.8; }
  100% { transform: scale(1.6); opacity: 0; }
}

/* Fog of war patches */
.fog-patch {
  position: absolute;
  background: var(--fog);
  backdrop-filter: blur(1px);
  pointer-events: none;
}

/* Mission markers */
.mission-marker {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 16px;
  height: 16px;
  cursor: pointer;
  z-index: 5;
}

.mission-flag {
  width: 2px;
  height: 14px;
  background: var(--red-bright);
  position: absolute;
  left: 0;
}

.mission-flag::after {
  content: '';
  position: absolute;
  top: 0;
  left: 2px;
  width: 10px;
  height: 7px;
  background: var(--red-bright);
  clip-path: polygon(0 0, 100% 30%, 0 70%);
}

/* Selection circle */
.selection-ring {
  position: absolute;
  border: 2px solid var(--sand);
  border-radius: 50%;
  width: 52px;
  height: 52px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  animation: rotate 4s linear infinite;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 15;
}

.selection-ring.visible { opacity: 1; }

@keyframes rotate {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Map HUD overlay */
.map-hud {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}

.hud-badge {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  padding: 4px 8px;
  font-size: 9px;
  color: var(--olive-light);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.compass {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 48px;
  height: 48px;
  pointer-events: none;
}

/* ─── RIGHT PANEL — INTEL ─── */
.panel-right {
  background: var(--panel-bg);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.mission-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.mission-item {
  background: rgba(74,92,42,0.1);
  border: 1px solid rgba(74,92,42,0.3);
  padding: 8px;
  border-radius: 1px;
  position: relative;
  overflow: hidden;
}

.mission-item.complete {
  opacity: 0.5;
  border-color: rgba(74,92,42,0.15);
}

.mission-item.active {
  border-color: var(--amber);
  background: rgba(255,179,71,0.06);
}

.mission-priority {
  position: absolute;
  top: 0;
  right: 0;
  font-size: 7px;
  padding: 2px 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.priority-critical { background: var(--red-bright); color: white; }
.priority-high { background: var(--amber); color: black; }
.priority-normal { background: var(--olive); color: var(--sand-light); }

.mission-name {
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--sand);
  margin-bottom: 3px;
  padding-right: 50px;
}

.mission-detail {
  font-size: 9px;
  color: var(--khaki);
  line-height: 1.4;
}

.mission-unit {
  font-size: 9px;
  color: var(--olive-light);
  margin-top: 4px;
  letter-spacing: 1px;
}

/* ─── BOTTOM HUD ─── */
.bottom-hud {
  grid-column: 1 / -1;
  background: var(--olive-dark);
  border-top: 2px solid var(--olive-light);
  display: grid;
  grid-template-columns: 280px 1fr 260px;
  overflow: hidden;
}

.hud-unit-detail {
  border-right: 1px solid var(--border);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.detail-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.detail-sprite { width: 48px; height: 48px; flex-shrink: 0; }

.detail-name {
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--sand);
  letter-spacing: 2px;
}

.detail-role {
  font-size: 9px;
  color: var(--olive-light);
  letter-spacing: 3px;
}

.detail-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.stat {
  background: rgba(0,0,0,0.3);
  padding: 4px;
  text-align: center;
  border: 1px solid rgba(74,92,42,0.3);
}

.stat-val {
  font-size: 14px;
  color: var(--green-hud);
  font-weight: bold;
}

.stat-label {
  font-size: 7px;
  color: var(--khaki);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Terminal / log */
.hud-terminal {
  padding: 8px 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.terminal-line {
  font-size: 10px;
  line-height: 1.6;
  display: flex;
  gap: 8px;
}

.tl-time { color: var(--olive-light); }
.tl-unit { color: var(--amber); }
.tl-msg { color: var(--sand-light); }
.tl-msg.error { color: var(--red-bright); }
.tl-msg.success { color: var(--green-hud); }

.terminal-cursor {
  display: inline-block;
  width: 6px;
  height: 11px;
  background: var(--green-hud);
  animation: blink 1s infinite;
  vertical-align: middle;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

/* Command grid */
.hud-commands {
  border-left: 1px solid var(--border);
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 4px;
}

.cmd-btn {
  background: rgba(74,92,42,0.2);
  border: 1px solid rgba(74,92,42,0.5);
  color: var(--sand-light);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 4px;
  transition: all 0.1s;
  text-align: center;
  letter-spacing: 0.5px;
  border-radius: 1px;
}

.cmd-btn:hover {
  background: rgba(74,92,42,0.45);
  border-color: var(--olive-light);
  color: var(--sand);
}

.cmd-btn:active {
  background: rgba(74,92,42,0.7);
  transform: scale(0.96);
}

.cmd-icon { font-size: 14px; line-height: 1; }
.cmd-key {
  font-size: 7px;
  color: var(--olive-light);
  border: 1px solid var(--olive);
  padding: 0 3px;
  border-radius: 1px;
}

.cmd-btn.danger { border-color: rgba(192,57,43,0.4); }
.cmd-btn.danger:hover { border-color: var(--red-bright); background: rgba(192,57,43,0.15); }

/* ─── SVG SPRITES ─── */
.sprite-green-beret { --c: #3a5a2a; --h: #c8a96e; }
.sprite-sniper { --c: #2a3a1a; --h: #8a8a6a; }
.sprite-sapper { --c: #5a4a2a; --h: #aaaaaa; }
.sprite-spy { --c: #1a1a1a; --h: #d4aa70; }
.sprite-driver { --c: #4a3a1a; --h: #c0c0c0; }
.sprite-marine { --c: #1a3a4a; --h: #8ab4c0; }

/* Animated unit on map */
@keyframes unitBob {
  0%, 100% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-3px); }
}

.agent-token.active-anim {
  animation: unitBob 2s ease-in-out infinite;
}

/* Fog fade in */
@keyframes fogIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.fog-patch { animation: fogIn 2s forwards; }

/* Alert flash */
@keyframes alertFlash {
  0%, 100% { border-color: var(--red-bright); }
  50% { border-color: transparent; }
}

.unit-card.alert { animation: alertFlash 0.8s infinite; }

/* Crosshair cursor for map */
.map-area { cursor: crosshair; }
</style>
</head>
<body>

<div class="layout">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="title-block">
      <span class="title-skull">☠</span>
      <div>
        <div class="title-text">Operative HQ</div>
        <div class="title-sub">Agent Command &amp; Control — Classified</div>
      </div>
    </div>
    <div class="topbar-status">
      <div class="status-item">
        <span class="status-val" id="stat-active">3</span>
        <span>ACTIVE</span>
      </div>
      <div class="status-item">
        <span class="status-val" style="color:var(--amber)" id="stat-busy">2</span>
        <span>BUSY</span>
      </div>
      <div class="status-item">
        <span class="status-val" style="color:var(--red-bright)" id="stat-waiting">1</span>
        <span>WAITING</span>
      </div>
      <div class="status-item">
        <span class="status-val" id="stat-missions">4</span>
        <span>MISSIONS</span>
      </div>
      <div class="status-item">
        <span class="status-val" style="color:var(--green-hud)" id="stat-complete">7</span>
        <span>COMPLETE</span>
      </div>
    </div>
    <div class="clock" id="clock">00:00:00</div>
  </div>

  <!-- LEFT — ROSTER -->
  <div class="panel-left">
    <div class="panel-header">Commando Roster</div>
    <div class="roster" id="roster"></div>
  </div>

  <!-- MAP -->
  <div class="map-area" id="map">
    <div class="map-canvas">

      <!-- Terrain -->
      <div class="terrain" style="width:180px;height:100px;background:rgba(45,58,24,0.6);top:20%;left:15%;transform:rotate(-15deg);border-radius:40%;"></div>
      <div class="terrain" style="width:120px;height:80px;background:rgba(45,58,24,0.5);top:55%;left:60%;border-radius:50%;"></div>
      <div class="terrain" style="width:200px;height:60px;background:rgba(74,60,30,0.3);top:70%;left:10%;transform:rotate(5deg);border-radius:30%;"></div>
      <div class="terrain" style="width:90px;height:90px;background:rgba(35,48,18,0.7);top:10%;left:70%;border-radius:50%;"></div>

      <!-- Map labels -->
      <div class="map-label" style="top:22%;left:16%;">Dense Forest</div>
      <div class="map-label" style="top:57%;left:61%;">Checkpoint</div>
      <div class="map-label" style="top:72%;left:11%;">Enemy Camp</div>
      <div class="map-label" style="top:12%;left:71%;">Watchtower</div>

      <!-- Mission markers -->
      <div class="mission-marker" style="top:35%;left:45%;">
        <div class="mission-flag"></div>
      </div>
      <div class="mission-marker" style="top:60%;left:25%;">
        <div class="mission-flag" style="background:var(--amber);"></div>
        <div class="mission-flag::after" style="background:var(--amber);"></div>
      </div>

    </div>

    <!-- Map HUD -->
    <div class="map-hud">
      <div class="hud-badge">▣ SECTOR 7-G</div>
      <div class="hud-badge">⚠ FOG ACTIVE</div>
    </div>

    <!-- Compass -->
    <svg class="compass" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" stroke="rgba(74,92,42,0.6)" stroke-width="1"/>
      <circle cx="24" cy="24" r="18" stroke="rgba(74,92,42,0.3)" stroke-width="1" stroke-dasharray="3 5"/>
      <polygon points="24,6 27,22 24,20 21,22" fill="#c0392b"/>
      <polygon points="24,42 21,26 24,28 27,26" fill="rgba(200,169,110,0.6)"/>
      <text x="24" y="4" text-anchor="middle" fill="rgba(200,169,110,0.8)" font-size="6" font-family="Oswald">N</text>
      <text x="44" y="26" text-anchor="middle" fill="rgba(200,169,110,0.5)" font-size="6" font-family="Oswald">E</text>
      <text x="4" y="26" text-anchor="middle" fill="rgba(200,169,110,0.5)" font-size="6" font-family="Oswald">W</text>
      <text x="24" y="46" text-anchor="middle" fill="rgba(200,169,110,0.5)" font-size="6" font-family="Oswald">S</text>
      <circle cx="24" cy="24" r="2" fill="rgba(200,169,110,0.8)"/>
    </svg>

    <!-- Agent tokens rendered by JS -->
    <div id="agent-tokens"></div>

    <!-- Fog patches -->

// ─── SVG SPRITE GENERATOR ────────────────────────────────────────────────────

function drawSprite(unit, size = 40) {
  const c = unit.color;
  const h = unit.helmetColor;
  const s = unit.skinColor;
  const id = unit.id;

  const sprites = {
    'green-beret': `

      <rect x="23" y="22" width="7" height="4" fill="#5a4a2a"/>
      <rect x="15" y="33" width="4" height="7" fill="${c}"/>
      <rect x="21" y="33" width="4" height="7" fill="${c}"/>`,
    'sapper': `
      <ellipse cx="20" cy="12" rx="7" ry="6" fill="${h}"/>
      <circle cx="20" cy="18" r="5" fill="${s}"/>
      <rect x="15" y="22" width="10" height="12" fill="${c}"/>
      <rect x="13" y="24" width="4" height="8" fill="${c}"/>
      <rect x="23" y="24" width="4" height="8" fill="${c}"/>
      <rect x="15" y="33" width="4" height="7" fill="${c}"/>
      <rect x="21" y="33" width="4" height="7" fill="${c}"/>
      <rect x="17" y="26" width="6" height="4" fill="#aaaaaa" rx="1"/>`,
    'spy': `
      <rect x="14" y="8" width="12" height="8" fill="#1a1a1a" rx="2"/>
      <circle cx="20" cy="18" r="5" fill="${s}"/>

      <rect x="13" y="22" width="5" height="10" fill="#2a2a2a"/>
      <rect x="22" y="22" width="5" height="10" fill="#2a2a2a"/>
      <rect x="15" y="33" width="4" height="7" fill="#1a1a1a"/>
      <rect x="21" y="33" width="4" height="7" fill="#1a1a1a"/>
      <rect x="18" y="22" width="4" height="10" fill="#3a3a3a"/>`,

      <rect x="13" y="10" width="14" height="6" fill="${h}" rx="1"/>
      <rect x="15" y="8" width="10" height="4" fill="#8a8a6a" rx="1"/>

// ─── RENDER FUNCTIONS ─────────────────────────────────────────────────────────

let selectedUnit = null;
let fogVisible = true;

function renderRoster() {
  const roster = document.getElementById('roster');
  roster.innerHTML = '';
  UNITS.forEach(unit => {
    const card = document.createElement('div');
    card.className = `unit-card ${unit.status} ${unit.id === selectedUnit?.id ? 'selected' : ''}`;
    card.innerHTML = `
      <div class="unit-header">
        ${drawSprite(unit, 32)}
        <div class="unit-info">
          <div class="unit-name">${unit.name}</div>
          <div class="unit-role">${unit.role}</div>
        </div>
        <div class="unit-status status-${unit.status}">${unit.status}</div>
      </div>
      <div class="unit-task">${unit.task}</div>
      <div class="unit-progress">
        <div class="progress-bar ${unit.status}" style="width:${unit.progress}%"></div>
      </div>
    `;
    card.addEventListener('click', () => selectUnit(unit));
    roster.appendChild(card);
  });
}

function renderMissions() {
  const list = document.getElementById('mission-list');
  list.innerHTML = '';
  MISSIONS.forEach(m => {
    const item = document.createElement('div');
    item.className = `mission-item ${m.status}`;
    item.innerHTML = `
      <div class="mission-priority priority-${m.priority}">${m.priority}</div>
      <div class="mission-name">${m.name}</div>
      <div class="mission-detail">${m.detail}</div>
      <div class="mission-unit">▶ ${m.unit}</div>
    `;
    list.appendChild(item);
  });
}

function renderTokens() {
  const container = document.getElementById('agent-tokens');
  container.innerHTML = '';
  const map = document.getElementById('map');
  const mw = map.offsetWidth;
  const mh = map.offsetHeight;

  UNITS.forEach(unit => {
    const token = document.createElement('div');
    token.className = `agent-token ${unit.status === 'active' ? 'active-anim' : ''}`;
    token.style.left = `${unit.mapX}%`;
    token.style.top = `${unit.mapY}%`;
    token.id = `token-${unit.id}`;
    token.innerHTML = `
      <div class="token-shadow"></div>
      <div class="token-sprite">${drawSprite(unit, 40)}</div>
      <div class="token-label">${unit.name}</div>
      <div class="token-pulse ${unit.status === 'active' ? 'active' : ''}"></div>
    `;
    token.addEventListener('click', () => selectUnit(unit));
    container.appendChild(token);
  });
}

function renderTerminal() {
  const term = document.getElementById('terminal');
  term.innerHTML = LOG_MESSAGES.slice(0, 7).map(l => `
    <div class="terminal-line">
      <span class="tl-time">[${l.time}]</span>
      <span class="tl-unit">${l.unit}</span>
      <span class="tl-msg ${l.type}">${l.msg}</span>
    </div>
  `).join('') + `<div class="terminal-line"><span class="tl-time">></span><span class="terminal-cursor"></span></div>`;
}

function selectUnit(unit) {
  selectedUnit = unit;
  renderRoster();

  // Update detail panel
  document.getElementById('detail-name').textContent = unit.name;
  document.getElementById('detail-role').textContent = unit.role + ' — ' + unit.agentType;
  document.getElementById('detail-sprite').innerHTML = drawSprite(unit, 48).replace(/<svg[^>]*>/, '').replace('</svg>', '');
  document.getElementById('d-tasks').textContent = unit.tasks;
  document.getElementById('d-done').textContent = unit.done;
  document.getElementById('d-tokens').textContent = unit.tokens;
  document.getElementById('d-uptime').textContent = unit.uptime;

  // Move selection ring
  const token = document.getElementById(`token-${unit.id}`);
  if (token) {
    const ring = document.getElementById('selection-ring');
    ring.style.left = unit.mapX + '%';
    ring.style.top = unit.mapY + '%';
    ring.classList.add('visible');
  }
}

// ─── COMMAND BUTTONS ──────────────────────────────────────────────────────────

function logAction(msg) {
  const now = new Date();
  const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  LOG_MESSAGES.unshift({ time: t, unit: 'COMMAND', msg, type: 'success' });
  renderTerminal();
}

function spawnAgent() {
  const name = prompt('Agent codename:') || 'OPERATIVE';
  const newUnit = {
    id: 'operative-' + Date.now(),
    name: name.toUpperCase(),
    role: 'Field Agent',
    agentType: 'Claude Code',
    status: 'active',
    task: 'Awaiting orders...',
    progress: 0,
    mapX: 30 + Math.random() * 40,
    mapY: 30 + Math.random() * 40,
    tasks: 0, done: 0, tokens: '0', uptime: '0m',
    color: '#3a5a2a', helmetColor: '#c8a96e', skinColor: '#c8a96e',
  };
  UNITS.push(newUnit);
  renderRoster();
  renderTokens();
  logAction(`SPAWN: ${newUnit.name} deployed to field`);
}

function sendOrder() {
  if (!selectedUnit) { logAction('ERROR: No unit selected'); return; }
  const order = prompt(`Order for ${selectedUnit.name}:`);
  if (order) {
    selectedUnit.task = order;
    selectedUnit.status = 'active';
    selectedUnit.progress = 5;
    renderRoster();
    logAction(`ORDER sent to ${selectedUnit.name}: ${order.slice(0, 40)}...`);
  }
}

function toggleFog() {
  fogVisible = !fogVisible;
  document.querySelectorAll('.fog-patch').forEach(f => {
    f.style.opacity = fogVisible ? '1' : '0';
  });
  logAction(fogVisible ? 'FOG OF WAR: Enabled' : 'FOG OF WAR: Disabled');
}

function groupAll() { logAction('GROUP: All operatives assembled'); }

function pauseAgent() {
  if (!selectedUnit) { logAction('ERROR: No unit selected'); return; }
  selectedUnit.status = 'idle';
  renderRoster();
  logAction(`PAUSE: ${selectedUnit.name} standing by`);
}

function resumeAgent() {
  if (!selectedUnit) { logAction('ERROR: No unit selected'); return; }
  selectedUnit.status = 'active';
  renderRoster();
  logAction(`RESUME: ${selectedUnit.name} re-engaged`);
}

function viewLog() { logAction('LOG: Viewing full mission log...'); }

function addMission() {
  const name = prompt('Mission name:');
  if (name) {
    MISSIONS.unshift({ name: name.toUpperCase(), detail: 'New mission — awaiting intel.', unit: selectedUnit?.name || '—', priority: 'normal', status: 'active' });
    renderMissions();
    logAction(`MISSION added: ${name}`);
  }
}

function worktree() { logAction('BRANCH: Opening worktree picker...'); }

function terminal() { logAction('TERMINAL: Launching integrated shell...'); }

function abortAgent() {
  if (!selectedUnit) { logAction('ERROR: No unit selected'); return; }
  if (confirm(`ABORT ${selectedUnit.name}? This will terminate the agent session.`)) {
    const idx = UNITS.findIndex(u => u.id === selectedUnit.id);
    if (idx > -1) UNITS.splice(idx, 1);
    selectedUnit = null;
    renderRoster();
    renderTokens();
    logAction('ABORT: Agent session terminated');
  }
}

function extractAll() {
  if (confirm('EXTRACT ALL? This will terminate all agent sessions.')) {
    UNITS.length = 0;
    selectedUnit = null;
    renderRoster();
    renderTokens();
    logAction('EXTRACT ALL: All operatives recalled. Mission complete.');
  }
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

// ─── SIMULATE PROGRESS ────────────────────────────────────────────────────────

function simulateTick() {
  UNITS.forEach(u => {
    if (u.status === 'active' && u.progress < 100) {
      u.progress = Math.min(100, u.progress + (Math.random() * 0.8));
      if (u.progress >= 100) {
        u.status = 'idle';
        u.task = 'Task complete — awaiting next order';
        u.done++;
        LOG_MESSAGES.unshift({
          time: new Date().toTimeString().slice(0,8),
          unit: u.name,
          msg: `Task complete (${u.done}/${u.tasks})`,
          type: 'success'
        });
        renderTerminal();
      }
    }
  });
  if (selectedUnit) {
    const fresh = UNITS.find(u => u.id === selectedUnit.id);
    if (fresh) {
      document.getElementById('d-done').textContent = fresh.done;
    }
  }
  renderRoster();
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  switch(e.key.toLowerCase()) {
    case 'q': spawnAgent(); break;
    case 'w': sendOrder(); break;
    case 'v': toggleFog(); break;
    case 'g': groupAll(); break;
    case 'p': pauseAgent(); break;
    case 'r': resumeAgent(); break;
    case 'l': viewLog(); break;
    case 'm': addMission(); break;
    case 'b': worktree(); break;
    case 'f': terminal(); break;
    case 'x': abortAgent(); break;
    case 'e': if(e.shiftKey) extractAll(); break;
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────

renderRoster();
renderMissions();
renderTokens();
renderTerminal();
updateClock();
setInterval(updateClock, 1000);
setInterval(simulateTick, 2000);

// Select first unit on load
setTimeout(() => selectUnit(UNITS[0]), 500);
</script>
